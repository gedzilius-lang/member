services:
  web:
    build: ./apps/web
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/memberos
      - NODE_ENV=production
      - SESSION_TTL_DAYS=7
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=memberos
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
